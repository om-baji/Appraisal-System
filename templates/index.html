<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Appraisal System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar" id="navbar" style="display: none;">
        <div class="nav-container">
            <div class="nav-brand">
                <h2>📊 Appraisal System</h2>
            </div>
            <div class="nav-user">
                <span id="userGreeting"></span>
                <button class="btn btn-logout" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <!-- Login/Signup Page -->
    <div id="authPage" class="auth-container">
        <div class="auth-card">
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="showLogin()">Login</button>
                <button class="auth-tab" onclick="showSignup()">Sign Up</button>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="auth-form">
                <h2>Welcome Back</h2>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Login</button>
                <div id="loginError" class="error-message"></div>
            </form>

            <!-- Signup Form -->
            <form id="signupForm" class="auth-form" style="display: none;">
                <h2>Create Account</h2>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="signupName" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="signupEmail" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="signupPassword" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Sign Up</button>
                <div id="signupError" class="error-message"></div>
            </form>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div id="dashboardPage" class="container" style="display: none;">
        <div class="dashboard-header">
            <h1>Employee Appraisal Dashboard</h1>
            <div class="action-buttons">
                <button class="btn btn-primary" onclick="showCreateAppraisalModal()">
                    ➕ Create Appraisal
                </button>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('myAppraisals')">My Appraisals</button>
            <button class="tab-btn" onclick="showTab('myReviews')">Appraisals I Created</button>
            <button class="tab-btn" onclick="showTab('allEmployees')">All Employees</button>
        </div>

        <!-- My Appraisals Tab -->
        <div id="myAppraisalsTab" class="tab-content active">
            <div class="stats-cards">
                <div class="stat-card">
                    <h3 id="myAppraisalsCount">0</h3>
                    <p>Total Appraisals</p>
                </div>
                <div class="stat-card">
                    <h3 id="myAvgRating">0</h3>
                    <p>Average Rating</p>
                </div>
            </div>
            <div id="myAppraisalsList" class="appraisals-grid"></div>
        </div>

        <!-- My Reviews Tab -->
        <div id="myReviewsTab" class="tab-content">
            <div class="stats-cards">
                <div class="stat-card">
                    <h3 id="myReviewsCount">0</h3>
                    <p>Appraisals Created</p>
                </div>
            </div>
            <div id="myReviewsList" class="appraisals-grid"></div>
        </div>

        <!-- All Employees Tab -->
        <div id="allEmployeesTab" class="tab-content">
            <div id="employeesList" class="employees-grid"></div>
        </div>
    </div>

    <!-- Create Appraisal Modal -->
    <div id="createAppraisalModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Create New Appraisal</h2>
                <button class="close-btn" onclick="closeCreateAppraisalModal()">&times;</button>
            </div>
            <form id="createAppraisalForm">
                <div class="form-group">
                    <label>Employee ID</label>
                    <input type="text" id="appraisalEmployeeId" placeholder="e.g., EMP001" required>
                </div>
                <div class="form-group">
                    <label>Appraisal Period</label>
                    <input type="text" id="appraisalPeriod" placeholder="e.g., Q1 2026" required>
                </div>
                <div class="form-group">
                    <label>Performance Rating (1-5)</label>
                    <div class="rating-selector">
                        <input type="radio" name="rating" value="1" id="rating1">
                        <label for="rating1">1 ⭐</label>
                        <input type="radio" name="rating" value="2" id="rating2">
                        <label for="rating2">2 ⭐</label>
                        <input type="radio" name="rating" value="3" id="rating3">
                        <label for="rating3">3 ⭐</label>
                        <input type="radio" name="rating" value="4" id="rating4">
                        <label for="rating4">4 ⭐</label>
                        <input type="radio" name="rating" value="5" id="rating5" checked>
                        <label for="rating5">5 ⭐</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>Goals Achieved (comma-separated)</label>
                    <textarea id="appraisalGoals" placeholder="Goal 1, Goal 2, Goal 3" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Strengths</label>
                    <textarea id="appraisalStrengths" placeholder="List employee's strengths..." rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Areas for Improvement</label>
                    <textarea id="appraisalImprovement" placeholder="Areas that need improvement..." rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Additional Comments</label>
                    <textarea id="appraisalComments" placeholder="Any additional feedback..." rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="appraisalStatus">
                        <option value="draft">Draft</option>
                        <option value="submitted">Submitted</option>
                        <option value="approved">Approved</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeCreateAppraisalModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Create Appraisal</button>
                </div>
                <div id="createAppraisalError" class="error-message"></div>
            </form>
        </div>
    </div>

    <!-- View Appraisal Modal -->
    <div id="viewAppraisalModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Appraisal Details</h2>
                <button class="close-btn" onclick="closeViewAppraisalModal()">&times;</button>
            </div>
            <div id="appraisalDetails" class="appraisal-details"></div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
